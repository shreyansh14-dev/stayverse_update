# Database Configuration
# Uses environment variable SPRING_DATASOURCE_URL if available, otherwise defaults to local file
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlite:database.sqlite}

# FIXED: Correct driver class for SQLite
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

# Server Configuration
# Uses environment variable SERVER_PORT (defaults to 5000)
server.port=${SERVER_PORT:5000}
