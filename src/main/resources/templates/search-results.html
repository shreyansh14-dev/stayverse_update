<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results | StayVerse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .fw-black { font-weight: 900; }
        .hotel-card { transition: transform 0.2s, box-shadow 0.2s; border: none; border-radius: 1.5rem; overflow: hidden; }
        .hotel-card:hover { transform: translateY(-5px); box-shadow: 0 1rem 3rem rgba(0,0,0,0.1) !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-black fs-3 text-primary" href="/">STAYVERSE</a>
            <div class="ms-auto">
                <a href="/explore" class="btn btn-outline-primary btn-sm rounded-pill px-4 fw-bold">New Search</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="mb-5 pb-4 border-bottom d-flex justify-content-between align-items-end">
            <div>
                <h1 class="h3 fw-black mb-1" th:text="${city} + ': ' + ${hotels.size()} + ' properties found'">City: 0 properties found</h1>
                <p class="text-muted mb-0 fw-bold">Best prices guaranteed for your dates</p>
            </div>
        </div>

        <div class="row g-4">
            <div th:each="hotel : ${hotels}" class="col-12">
                <div class="card hotel-card shadow-sm">
                    <div class="row g-0">
                        <div class="col-md-4">
                            <img th:src="${hotel.image}" class="img-fluid h-100 w-100 object-fit-cover" th:alt="${hotel.name}" style="min-height: 250px;">
                        </div>
                        <div class="col-md-8 p-4 d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <div>
                                    <h3 class="h5 fw-black text-primary mb-1" th:text="${hotel.name}">Hotel Name</h3>
                                    <p class="small text-muted fw-bold mb-3" th:text="${hotel.location}">Location</p>
                                    <div class="badge bg-primary px-3 py-2 fs-6" th:text="${hotel.rating} + ' ★'">4.5 ★</div>
                                </div>
                                <div class="text-end">
                                    <div class="h2 fw-black text-dark mb-0" th:text="'₹' + ${#numbers.formatDecimal(hotel.price, 0, 'COMMA', 0, 'POINT')}">₹0</div>
                                    <p class="small text-muted fw-bold mb-3">per night</p>
                                    <a th:href="'/property?id=' + ${hotel.id}" class="btn btn-primary fw-black px-5 py-3 rounded-pill shadow">View Details</a>
                                </div>
                            </div>
                            <p class="text-secondary small mt-3 flex-grow-1" th:text="${hotel.description}">Description</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:if="${hotels.empty}" class="text-center py-5">
            <h3 class="fw-black text-muted">No hotels found in this city.</h3>
            <a href="/explore" class="btn btn-primary mt-3 px-5 py-3 rounded-pill fw-black">Try another destination</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
