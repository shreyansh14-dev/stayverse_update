<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayVerse | 100% Java Luxury Travel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #020617; }
        .fw-black { font-weight: 900; }
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1542314831-c6a4d27488c0?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-black fs-3" href="/">STAYVERSE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-bold">
                    <li class="nav-item"><a class="nav-link active" href="/explore">Explore</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard">My Trips</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-primary text-white ms-lg-3 px-4" href="/explore">Book Now</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container text-center">
            <h1 class="display-1 fw-black mb-4">Elevate Your Journey</h1>
            <p class="fs-4 mb-5 opacity-75">Experience the world's most exclusive stays, curated by Java intelligence.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="/explore" class="btn btn-primary btn-lg px-5 py-3 fw-black rounded-pill shadow-lg">Start Exploring</a>
                <a href="#about" class="btn btn-outline-light btn-lg px-5 py-3 fw-black rounded-pill">Learn More</a>
            </div>
        </div>
    </header>

    <footer class="bg-dark text-white py-5">
        <div class="container text-center">
            <p class="mb-0 fw-bold">&copy; 2026 StayVerse Platform. Built entirely with Java Spring Boot & Thymeleaf.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
