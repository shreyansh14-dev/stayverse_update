<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trips | StayVerse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .fw-black { font-weight: 900; }
        .trip-card { border: none; border-radius: 1.5rem; transition: transform 0.2s; }
        .trip-card:hover { transform: scale(1.02); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-black fs-3" href="/">STAYVERSE</a>
            <div class="ms-auto">
                <a href="/explore" class="btn btn-primary btn-sm rounded-pill px-4 fw-bold">New Booking</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="mb-5">
            <h1 class="display-5 fw-black text-dark">My Travel Itinerary</h1>
            <p class="text-muted fw-bold fs-5">Manage your upcoming stays and trips, all processed by Java.</p>
        </div>

        <div class="row g-4">
            <div class="col-md-8">
                <div class="vstack gap-4">
                    <div th:each="booking : ${bookings}" class="card trip-card shadow-sm p-4 border-start border-primary border-5">
                        <div class="row align-items-center">
                            <div class="col">
                                <h4 class="h5 fw-black text-primary mb-1" th:text="'Trip ID: #' + ${booking.id}">Trip ID</h4>
                                <div class="fw-bold mb-2">Confirmed Luxury Stay</div>
                                <div class="text-muted small fw-bold" th:text="${booking.checkIn} + ' to ' + ${booking.checkOut}">Dates</div>
                            </div>
                            <div class="col text-end">
                                <div class="h4 fw-black text-dark mb-1" th:text="'₹' + ${#numbers.formatDecimal(booking.totalPrice, 0, 'COMMA', 0, 'POINT')}">₹0</div>
                                <span class="badge bg-success-subtle text-success border border-success px-3 py-2 rounded-pill fw-bold" th:text="${booking.status}">Status</span>
                            </div>
                        </div>
                    </div>
                    
                    <div th:if="${bookings.empty}" class="text-center py-5 bg-white rounded-4 shadow-sm border border-dashed">
                        <p class="text-muted fw-bold fs-5 mb-0">No active trips found. Let's start planning!</p>
                        <a href="/explore" class="btn btn-primary mt-4 px-5 py-3 rounded-pill fw-black">Explore Destinations</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 rounded-4 bg-primary text-white">
                    <h3 class="h5 fw-black mb-4">Travel Statistics</h3>
                    <div class="vstack gap-3">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold opacity-75">Total Trips</span>
                            <span class="fw-black" th:text="${bookings.size()}">0</span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold opacity-75">Active Status</span>
                            <span class="fw-black text-warning">Premier Member</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
